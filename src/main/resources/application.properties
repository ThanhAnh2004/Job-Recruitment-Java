server.port=${SERVER_PORT:8080}
server.http2.enabled=true
server.servlet.session.timeout=30m

spring.application.name=JOB_RECRUITMENT
spring.main.allow-bean-definition-overriding=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jobhunter}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:818757}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# config jwt
jwt.base64-secret=${JWT_BASE64_SECRET:b7X5G7TBz4bKAio88ToFzGtdaaFfOJWJjvECRXgTDlHJaZ02Ha9ZkQgaSeBpwLqkHPa4Nrp3WiXIN1qc8KEVVd}
# expriation: 1 day(seconds = 25 * 60 * 60)
# 8640000: 100 days
jwt.access-token-validity-in-seconds=8640000
jwt.refresh-token-validity-in-seconds=8640000

logging.level.org.springframework.security=DEBUG

# Config pagination
# start page = 1
spring.data.web.pageable.one-indexed-parameters=true

# base path
upload-file.base-uri=${UPLOAD_FILE_BASE_URI:file:///D:/JAVA-RESTFUL/upload/}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

###
# config email with gmail*
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
###

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4173,http://localhost:5173}
app.cookie.secure=${APP_COOKIE_SECURE:false}

